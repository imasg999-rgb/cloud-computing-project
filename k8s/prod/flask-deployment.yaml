apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-prod
spec:
  replicas: 2   # HIGH AVAILABILITY
  selector:
    matchLabels:
      app: flask-prod
  template:
    metadata:
      labels:
        app: flask-prod
    spec:
      containers:
        - name: flask
          image: us-central1-docker.pkg.dev/cloud-computing-project-ece-1/flask-repo/flask-app
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              value: mysql-service
            - name: DB_USER
              value: root
            - name: DB_PASSWORD
              value: password
            - name: DB_NAME
              value: crud_db